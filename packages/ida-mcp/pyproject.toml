[project]
name = "ida-mcp"
version = "3.0.0rc3"
description = "Alias package for re-mcp-ida — installs re-mcp-ida"
license = "MIT OR Apache-2.0"
authors = [
    { name = "Joe T. Sylve, Ph.D.", email = "joe.sylve@gmail.com" }
]
requires-python = ">=3.12"
keywords = ["ida", "ida-pro", "mcp", "reverse-engineering", "binary-analysis", "idalib"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "Topic :: Security",
    "Topic :: Software Development :: Disassemblers",
    "Typing :: Typed",
]
readme = "README.md"
dependencies = [
    "re-mcp-ida>=3.0.0.dev1",
]

[project.scripts]
ida-mcp = "re_mcp_ida._cli:main"

[project.urls]
Homepage = "https://github.com/jtsylve/ida-mcp"
Repository = "https://github.com/jtsylve/ida-mcp"
Issues = "https://github.com/jtsylve/ida-mcp/issues"
Documentation = "https://github.com/jtsylve/ida-mcp/tree/main/docs"

[build-system]
requires = ["setuptools>=75"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = []
