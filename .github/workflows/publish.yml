name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [re-mcp-core, re-mcp-ida, ida-mcp, re-mcp-ghidra, re-mcp]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
      - run: uv build ${{ matrix.package == 're-mcp' && '.' || format('packages/{0}', matrix.package) }}
      - uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.package }}
          path: dist/

  publish-core:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/re-mcp-core
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist-re-mcp-core
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-re-mcp-ida:
    needs: publish-core
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/re-mcp-ida
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist-re-mcp-ida
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-ida-mcp:
    needs: publish-re-mcp-ida
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ida-mcp
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist-ida-mcp
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-re-mcp-ghidra:
    needs: publish-core
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/re-mcp-ghidra
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist-re-mcp-ghidra
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-re-mcp:
    needs: [publish-re-mcp-ida, publish-ida-mcp, publish-re-mcp-ghidra]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/re-mcp
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist-re-mcp
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
