[project]
name = "re-mcp-ghidra"
version = "3.0.1"
description = "Ghidra backend for re-mcp — headless Ghidra MCP server using pyghidra"
license = "MIT OR Apache-2.0"
authors = [
    { name = "Joe T. Sylve, Ph.D.", email = "joe.sylve@gmail.com" }
]
requires-python = ">=3.12"
keywords = ["ghidra", "mcp", "reverse-engineering", "binary-analysis", "pyghidra"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "Topic :: Security",
    "Topic :: Software Development :: Disassemblers",
    "Typing :: Typed",
]
readme = "README.md"
dependencies = [
    "re-mcp-core>=0.1.0",
    "pyghidra>=3.0",
    "jpype1>=1.5,<1.7",
]

[project.urls]
Homepage = "https://github.com/jtsylve/ida-mcp"
Repository = "https://github.com/jtsylve/ida-mcp"
Issues = "https://github.com/jtsylve/ida-mcp/issues"
Documentation = "https://github.com/jtsylve/ida-mcp/tree/main/docs"

[project.scripts]
re-mcp-ghidra = "re_mcp_ghidra._cli:main"
re-mcp-ghidra-worker = "re_mcp_ghidra.server:main"

[project.entry-points."re_mcp.backends"]
ghidra = "re_mcp_ghidra.backend:GhidraBackend"

[build-system]
requires = ["hatchling>=1.25,<2"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/re_mcp_ghidra"]
